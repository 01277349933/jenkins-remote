# Jenkins Agent Node Configuration Guide
# ─────────────────────────────────────────────────────────
# This file describes how to connect remote agents to Jenkins
# using the Jenkins Remoting protocol (JNLP / SSH).
# ─────────────────────────────────────────────────────────

# ── Option 1: SSH Agent (Linux) ──────────────────────────
#
# On Jenkins Master (Manage Jenkins → Nodes → New Node):
#   - Node name: linux-agent
#   - Remote root directory: /home/jenkins/agent
#   - Labels: linux-agent
#   - Launch method: Launch agents via SSH
#   - Host: <AGENT_IP>
#   - Credentials: SSH key pair
#
# On the remote Linux machine:
#   sudo useradd -m jenkins
#   sudo mkdir -p /home/jenkins/.ssh
#   sudo chmod 700 /home/jenkins/.ssh
#   # Paste your public key into:
#   # /home/jenkins/.ssh/authorized_keys
#   sudo apt-get install -y openjdk-17-jdk

# ── Option 2: JNLP Agent (any OS) ────────────────────────
#
# On Jenkins Master (Manage Jenkins → Nodes → New Node):
#   - Launch method: Launch agent by connecting it to the controller
#   - Copy the secret token shown
#
# On the remote machine, run:
#   java -jar agent.jar \
#     -url http://<JENKINS_URL>:8080/ \
#     -secret <SECRET_TOKEN> \
#     -name linux-agent \
#     -workDir /home/jenkins/agent

# ── Option 3: Docker-based Agent ─────────────────────────
#
# Run a Jenkins agent inside Docker on a remote machine:
#
#   docker run -d \
#     --name jenkins-agent \
#     -e JENKINS_URL=http://<JENKINS_URL>:8080 \
#     -e JENKINS_AGENT_NAME=linux-agent \
#     -e JENKINS_SECRET=<SECRET_TOKEN> \
#     jenkins/inbound-agent

# ── Node Isolation (Security) ────────────────────────────
#
# To isolate nodes:
# - Use separate user accounts per agent
# - Limit agent SSH keys to specific commands
# - Restrict agent labels in the pipeline (agent { label 'linux-agent' })
# - Use Credentials Plugin to store secrets securely
